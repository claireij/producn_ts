name: Auto Version on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect bump type from branch name
        id: bump
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Branch: $BRANCH"

          if [[ "$BRANCH" == breaking/* || "$BRANCH" == *"!/"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == feat/* || "$BRANCH" == feature/* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == fix/* || "$BRANCH" == bugfix/* || "$BRANCH" == hotfix/* ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and tag
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get latest tag or default to v0.0.0
          LATEST=$(git tag --sort=-v:refname | head -n1)
          LATEST=${LATEST:-v0.0.0}
          VERSION=${LATEST#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BUMP="${{ steps.bump.outputs.type }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          # Update package.json version
          npm version "$NEW_TAG" --no-git-tag-version --yes

          # Commit the version update
          git add package.json
          git commit -m "Bump version to $NEW_TAG"

          git tag "$NEW_TAG"
          git push origin main "$NEW_TAG"

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          generate_release_notes: true